name: Update Trends Data

on:
  schedule:
    # 매 6시간마다 실행 (KST 03:00, 09:00, 15:00, 21:00)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        run: python crawler/fetch_trends.py

      - name: Copy data to docs
        run: cp data/*.json docs/data/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          git diff --staged --quiet || git commit -m "chore: auto-update trends data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

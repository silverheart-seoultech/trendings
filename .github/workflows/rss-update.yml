name: RSS Feed Update (Frequent)

on:
  schedule:
    # 매 1시간마다 실행 — RSS는 가볍고 빠름
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rss-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run RSS feed crawler
        run: python crawler/rss_feeds.py

      - name: Copy to docs
        run: cp data/rss_feeds.json docs/data/ 2>/dev/null || true

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rss_feeds.json docs/data/rss_feeds.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: RSS feed update $(date -u +%H:%M)"
          git push || true
